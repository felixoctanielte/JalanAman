services:
  postgres:
    image: postgres:16-alpine
    container_name: jalanaman_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jalanaman
      POSTGRES_PASSWORD: jalanaman
      POSTGRES_DB: jalanaman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jalanaman -d jalanaman"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jalanaman_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend                  # <-- Diubah ke root workspace
      dockerfile: Dockerfile # <-- Diubah jalurnya
    container_name: jalanaman_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://jalanaman:jalanaman@postgres:5432/jalanaman
      REDIS_URL: redis://redis:6379
      PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      RUST_LOG: ${RUST_LOG:-jalan_aman_backend=info}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY_PEM: ${VAPID_PRIVATE_KEY_PEM}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    container_name: jalanaman_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  redis_data:
  frontend_dist: