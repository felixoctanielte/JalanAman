<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="description" content="JalanAman – Rute Teraman untuk Pejalan Kaki Indonesia" />
  <title>JalanAman</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

  <!-- Tailwind CSS (pre-built via: npx tailwindcss -i assets/tailwind.css -o assets/tw.css) -->
  <link rel="stylesheet" href="assets/tw.css" />

  <!-- MapLibre GL + OpenFreeMap vector tiles (no API key needed) -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
</head>
<body class="overflow-hidden">

<div id="main"></div>

<!-- ═══════════════════════════════════════════════════════════════════════
     JalanAman JS helpers  (called from Rust via wasm_bindgen)
     MapLibre is already loaded from CDN above — no async waiting needed.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
  // ── Map state ───────────────────────────────────────────────────────────────
  window.jaMap          = null;
  window.jaMarkers      = [];
  window.jaLastLocation = null;

  const JA_STYLE_URL = 'https://tiles.openfreemap.org/styles/liberty';

  function jaWhenMapReady (fn) {
    if (!window.jaMap) return;
    if (window.jaMap.loaded()) fn();
    else window.jaMap.once('load', fn);
  }

  function jaReportColor (category) {
    return ({ crime: '#ef4444', accident: '#f97316', lighting: '#eab308', other: '#64748b' })[category] || '#64748b';
  }

  function jaReportLabel (category) {
    return ({ crime: 'Rawan Begal/Copet', accident: 'Rawan Kecelakaan', lighting: 'Pencahayaan Buruk', other: 'Lainnya' })[category] || 'Lainnya';
  }

  function jaReportEmoji (category) {
    return ({ crime: '!', accident: '!', lighting: '!', other: 'i' })[category] || 'i';
  }

  function jaFeatureCollection (features) {
    return { type: 'FeatureCollection', features };
  }

  function jaUpdateCurrentLocation () {
    if (!window.jaMap || !window.jaLastLocation) return;
    const data = jaFeatureCollection([{
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [window.jaLastLocation.lng, window.jaLastLocation.lat] },
      properties: {},
    }]);

    const source = window.jaMap.getSource('ja-current-location');
    if (source) {
      source.setData(data);
      return;
    }

    window.jaMap.addSource('ja-current-location', { type: 'geojson', data });
    window.jaMap.addLayer({
      id: 'ja-current-location-halo',
      type: 'circle',
      source: 'ja-current-location',
      paint: {
        'circle-radius': 22,
        'circle-color': '#2563eb',
        'circle-opacity': 0.18,
      },
    });
    window.jaMap.addLayer({
      id: 'ja-current-location-dot',
      type: 'circle',
      source: 'ja-current-location',
      paint: {
        'circle-radius': 8,
        'circle-color': '#2563eb',
        'circle-stroke-color': '#ffffff',
        'circle-stroke-width': 3,
      },
    });
  }

  window.ja_initMap = function (lat, lng) {
    const el = document.getElementById('map-container');
    if (!el) return;
    window.jaLastLocation = { lat, lng };

    if (window.jaMap) {
      window.jaMap.easeTo({ center: [lng, lat], zoom: Math.max(window.jaMap.getZoom(), 15), duration: 400 });
      jaWhenMapReady(jaUpdateCurrentLocation);
      return;
    }

    window.jaMap = new maplibregl.Map({
      container: 'map-container',
      style: JA_STYLE_URL,
      center: [lng, lat],
      zoom: 16,
      pitch: 42,
      bearing: -12,
      attributionControl: true,
    });
    window.jaMap.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
    window.jaMap.once('load', jaUpdateCurrentLocation);
  };

  window.ja_addReportMarker = function (id, lat, lng, category, note) {
    if (!window.jaMap) return;
    const color = jaReportColor(category);
    const el = document.createElement('button');
    el.type = 'button';
    el.setAttribute('aria-label', jaReportLabel(category));
    el.style.cssText = [
      'width:24px;height:24px;border-radius:50%;border:3px solid #fff',
      `background:${color};color:#fff;font:900 12px/18px system-ui`,
      'box-shadow:0 10px 18px rgba(15,23,42,.25);cursor:pointer',
      'display:flex;align-items:center;justify-content:center;padding:0',
    ].join(';');
    el.textContent = jaReportEmoji(category);

    const popup = new maplibregl.Popup({ offset: 18, closeButton: false }).setHTML(
      `<strong style="color:${color}">${jaReportLabel(category)}</strong>` +
      (note ? `<br><span style="color:#475569;font-size:12px">${note}</span>` : '')
    );

    const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lng, lat])
      .setPopup(popup)
      .addTo(window.jaMap);

    marker.__id = id;
    window.jaMarkers.push(marker);
  };

  window.ja_clearMarkers = function () {
    window.jaMarkers.forEach(m => m.remove());
    window.jaMarkers = [];
  };

  window.ja_drawRoutePolyline = function (waypointsJson, level) {
    if (!window.jaMap) return;
    const colors = { Aman: '#22c55e', Waspada: '#f59e0b', Hindari: '#ef4444' };
    const points = JSON.parse(waypointsJson).map(p => [p.lng, p.lat]);
    const data = jaFeatureCollection([{
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: points },
      properties: { level },
    }]);

    jaWhenMapReady(() => {
      const source = window.jaMap.getSource('ja-route');
      if (source) {
        source.setData(data);
        window.jaMap.setPaintProperty('ja-route-line', 'line-color', colors[level] || '#2563eb');
      } else {
        window.jaMap.addSource('ja-route', { type: 'geojson', data });
        window.jaMap.addLayer({
          id: 'ja-route-line',
          type: 'line',
          source: 'ja-route',
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': colors[level] || '#2563eb',
            'line-width': 6,
            'line-opacity': 0.9,
          },
        });
      }

      if (points.length) {
        const bounds = points.reduce(
          (b, point) => b.extend(point),
          new maplibregl.LngLatBounds(points[0], points[0]),
        );
        window.jaMap.fitBounds(bounds, { padding: 56, maxZoom: 16, duration: 600 });
      }
    });
  };

  window.ja_initHeatmap = function (pointsJson) {
    if (!window.jaMap) return;
    const weights = { crime: 3, accident: 2, lighting: 1.4, other: 1 };
    const points = JSON.parse(pointsJson).map(p => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
      properties: { weight: weights[p.category] || 1 },
    }));
    const data = jaFeatureCollection(points);

    jaWhenMapReady(() => {
      const source = window.jaMap.getSource('ja-heatmap');
      if (source) {
        source.setData(data);
        return;
      }

      window.jaMap.addSource('ja-heatmap', { type: 'geojson', data });
      window.jaMap.addLayer({
        id: 'ja-heatmap-layer',
        type: 'heatmap',
        source: 'ja-heatmap',
        maxzoom: 18,
        paint: {
          'heatmap-weight': ['interpolate', ['linear'], ['get', 'weight'], 0, 0, 3, 1],
          'heatmap-intensity': ['interpolate', ['linear'], ['zoom'], 9, 0.7, 16, 1.8],
          'heatmap-radius': ['interpolate', ['linear'], ['zoom'], 9, 18, 16, 34],
          'heatmap-opacity': 0.78,
          'heatmap-color': [
            'interpolate', ['linear'], ['heatmap-density'],
            0, 'rgba(37,99,235,0)',
            0.25, '#60a5fa',
            0.5, '#f59e0b',
            0.78, '#f97316',
            1, '#ef4444',
          ],
        },
      });
    });
  };

  window.ja_panTo = function (lat, lng) {
    if (!window.jaMap) return;
    window.jaLastLocation = { lat, lng };
    jaWhenMapReady(jaUpdateCurrentLocation);
    window.jaMap.easeTo({ center: [lng, lat], duration: 350 });
  };

  // ── SOS alarm (local device) ─────────────────────────────────────────────────
  window.ja_playSOSAlarm = function () {
    if (navigator.vibrate) navigator.vibrate([800, 200, 800, 200, 800, 200, 800]);
    try {
      const ctx   = new (window.AudioContext || window.webkitAudioContext)();
      const freqs = [880, 440, 880, 440, 880, 440];
      freqs.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square'; osc.frequency.value = freq; gain.gain.value = 0.4;
        osc.connect(gain); gain.connect(ctx.destination);
        const t = ctx.currentTime + i * 0.45;
        osc.start(t); osc.stop(t + 0.4);
      });
    } catch (e) { console.warn('AudioContext:', e); }
  };

  window.ja_stopSOSAlarm = function () {
    if (navigator.vibrate) navigator.vibrate(0);
  };

  // ── Push notifications ───────────────────────────────────────────────────────
  window.ja_registerServiceWorker = async function () {
    if (!('serviceWorker' in navigator)) return null;
    try   { return await navigator.serviceWorker.register('/sw.js'); }
    catch (e) { console.error('SW register:', e); return null; }
  };

  window.ja_requestNotificationPermission = async function () {
    if (!('Notification' in window)) return 'denied';
    return await Notification.requestPermission();
  };

  window.ja_subscribePush = async function (vapidPublicKey) {
    const reg      = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();
    if (existing) return JSON.stringify(existing.toJSON());

    function urlB64ToUint8 (b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8(vapidPublicKey),
    });
    return JSON.stringify(sub.toJSON());
  };

  // ── Geolocation ──────────────────────────────────────────────────────────────
  window.ja_getCurrentPosition = function (callback) {
    if (!navigator.geolocation) { callback(null, null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => callback(pos.coords.latitude, pos.coords.longitude),
      _   => callback(null, null),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  };

  // ── Clipboard ─────────────────────────────────────────────────────────────────
  window.ja_copyToClipboard = function (text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).catch(console.warn);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  };

  // ── Device hash (persisted in localStorage) ──────────────────────────────────
  window.ja_getDeviceHash = function () {
    let h = localStorage.getItem('ja_device_hash');
    if (!h) {
      h = (typeof crypto.randomUUID === 'function')
        ? crypto.randomUUID()
        : Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('ja_device_hash', h);
    }
    return h;
  };
</script>

</body>
</html>
